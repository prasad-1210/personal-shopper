# LangGraph template workflow — aligned with multi-agent layout
name: Unit Tests (template)

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv venv
          uv pip install -r pyproject.toml
          uv pip install pytest ruff langsmith
      - name: Lint with ruff
        run: uv run ruff check src/ supervisor/ agents/ shared/ tests/ --ignore E501,D
      - name: Type check with mypy
        run: |
          uv pip install mypy
          uv run mypy shared src/personal_shopper/tools
      - name: Run unit tests
        env:
          USE_MOCK_TOOLS: "true"
          LANGSMITH_TRACING: "false"
          OPENAI_API_KEY: "sk-test-fake"
        run: uv run pytest tests/unit/ -v
      - name: Graph import check
        env:
          USE_MOCK_TOOLS: "true"
          LANGSMITH_TRACING: "false"
          OPENAI_API_KEY: "sk-test-fake"
        run: |
          uv run python -c "from supervisor.graph import graph; print('supervisor OK')"
