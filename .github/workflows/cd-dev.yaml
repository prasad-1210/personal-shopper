name: CD — Build and push (dev)

on:
  push:
    branches: [master, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}/personal-shopper
  UI_IMAGE: ghcr.io/${{ github.repository }}/personal-shopper-ui

jobs:
  matrix-prep:
    name: Resolve agent matrix
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.set.outputs.agents }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - id: set
        run: |
          AGENTS=$(python3 -c "
          import json, subprocess
          ids = subprocess.check_output(
              ['python3', 'scripts/langgraph-agents.py', 'ids'], text=True
          ).split()
          print(json.dumps(ids))
          ")
          echo "agents=${AGENTS}" >> "$GITHUB_OUTPUT"

  build-push-agent:
    name: Agent — ${{ matrix.agent }}
    runs-on: ubuntu-latest
    needs: matrix-prep
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.matrix-prep.outputs.agents) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install langgraph-cli
        run: pip install "langgraph-cli>=0.2.11" pyyaml

      - name: Build and push ${{ matrix.agent }} image
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          bash scripts/build-agent-images.sh \
            --tag "${{ github.sha }}" \
            --only "${{ matrix.agent }}" \
            --push
          SHA_TAG="${IMAGE_PREFIX}-${{ matrix.agent }}:${{ github.sha }}"
          DEV_TAG="${IMAGE_PREFIX}-${{ matrix.agent }}:dev"
          bash scripts/docker-push-retry.sh tag-remote "${SHA_TAG}" "${DEV_TAG}"

  build-push-ui:
    name: UI image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build UI image
        run: docker build -f Dockerfile.ui -t "${{ env.UI_IMAGE }}:${{ github.sha }}" .

      - name: Push UI image
        run: |
          bash scripts/docker-push-retry.sh push "${{ env.UI_IMAGE }}:${{ github.sha }}"
          bash scripts/docker-push-retry.sh tag-remote \
            "${{ env.UI_IMAGE }}:${{ github.sha }}" \
            "${{ env.UI_IMAGE }}:dev"

  helm-validate:
    name: Helm validate (post-build)
    runs-on: ubuntu-latest
    needs: [build-push-agent, build-push-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint and template (supervisor, local)
        run: |
          helm lint deploy/helm/charts/langgraph-primitives \
            -f deploy/helm/org/values.yaml \
            -f deploy/helm/overlays/local/values.yaml \
            -f deploy/helm/agents/supervisor/values.yaml \
            -f deploy/helm/org/configmap.yaml \
            -f deploy/helm/overlays/local/configmap.yaml \
            -f deploy/helm/agents/supervisor/configmap.yaml
          helm template supervisor deploy/helm/charts/langgraph-primitives \
            --namespace agents-dev \
            -f deploy/helm/org/values.yaml \
            -f deploy/helm/overlays/local/values.yaml \
            -f deploy/helm/agents/supervisor/values.yaml \
            -f deploy/helm/org/configmap.yaml \
            -f deploy/helm/overlays/local/configmap.yaml \
            -f deploy/helm/agents/supervisor/configmap.yaml \
            --set image.repository=${{ env.IMAGE_PREFIX }}-supervisor \
            --set image.tag=${{ github.sha }} \
            > /dev/null

  deploy-instructions:
    name: Deployment instructions
    runs-on: ubuntu-latest
    needs: [build-push-agent, build-push-ui, helm-validate]
    steps:
      - uses: actions/checkout@v4
      - name: Print deploy command
        run: |
          echo "Images pushed (one image per agent in deploy/agents.manifest.yaml + UI)."
          echo ""
          echo "bash deploy/scripts/helm-deploy-all.sh local"
          echo "# Or per agent:"
          echo "IMAGE_TAG=${{ github.sha }} IMAGE_REPOSITORY=${{ env.IMAGE_PREFIX }}-supervisor \\"
          echo "  bash deploy/scripts/helm-deploy.sh supervisor local"
