name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest ruff langsmith

      - name: Lint
        run: |
          ruff check supervisor/ shared/ agents/ tests/unit/ src/ --ignore E501,D || true

      - name: Unit tests (mock mode — no API keys needed)
        env:
          USE_MOCK_TOOLS: "true"
          LANGSMITH_TRACING: "false"
          OPENAI_API_KEY: "sk-test-fake"
        run: pytest tests/unit/ -v

      - name: Multi-agent graph import check
        env:
          USE_MOCK_TOOLS: "true"
          LANGSMITH_TRACING: "false"
          OPENAI_API_KEY: "sk-test-fake"
          RECIPE_PROVIDER: "edamam"
          NUTRITION_AGENT_URL: "http://127.0.0.1:22001"
          RECIPE_AGENT_URL: "http://127.0.0.1:22002"
          SHOPPING_AGENT_URL: "http://127.0.0.1:22003"
          BUDGET_AGENT_URL: "http://127.0.0.1:22004"
        run: |
          python -c "
          import contextlib
          from supervisor.graph import graph as supervisor_graph, _remote
          from agents.nutrition_agent.graph import graph as nutrition_graph
          from agents.recipe_agent.graph import graph as recipe_graph
          from agents.shopping_agent.graph import graph as shopping_graph
          from agents.budget_agent.graph import graph as budget_graph

          assert supervisor_graph is not None
          for name, g in [
              ('nutrition', nutrition_graph),
              ('recipe', recipe_graph),
              ('shopping', shopping_graph),
              ('budget', budget_graph),
          ]:
              cm = g({})
              assert hasattr(cm, '__enter__'), f'{name} must export traced contextmanager'
          remote = _remote('nutrition_agent', 'http://127.0.0.1:22001')
          assert remote.distributed_tracing is True
          print('multi-agent graphs OK')
          "

      - name: UI import check
        run: |
          cd ui && pip install -r requirements.txt
          python -c "import server; print('UI OK')"

  build-langgraph-images:
    name: Build LangGraph Images (per agent)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify image_distro wolfi in all langgraph.json
        run: |
          FAILED=0
          for f in agents/*/langgraph.json supervisor/langgraph.json; do
            if [ -f "$f" ]; then
              DISTRO=$(python -c "import json; d=json.load(open('$f')); print(d.get('image_distro','MISSING'))")
              if [ "$DISTRO" != "wolfi" ]; then
                echo "FAIL: $f — image_distro is '$DISTRO', must be 'wolfi'"
                FAILED=1
              else
                echo "OK:   $f — image_distro=wolfi"
              fi
            fi
          done
          [ $FAILED -eq 0 ] || exit 1

      - name: Install langgraph-cli
        run: pip install "langgraph-cli>=0.2.11"

      - name: Build all agent images (langgraph build / wolfi)
        run: bash scripts/build-agent-images.sh --tag ci

      - name: Verify supervisor image imports graph
        run: |
          docker run --rm personal-shopper-supervisor:ci \
            python -c "
          import os
          os.environ.setdefault('OPENAI_API_KEY', 'sk-test-fake')
          os.environ.setdefault('LANGSMITH_TRACING', 'false')
          from supervisor.graph import graph
          print('supervisor graph import in image OK')
          " || echo "Note: import check skipped if runtime env not available in image"

      - name: Verify nutrition image imports graph
        run: |
          docker run --rm personal-shopper-nutrition:ci \
            python -c "
          import os
          os.environ.setdefault('OPENAI_API_KEY', 'sk-test-fake')
          os.environ.setdefault('LANGSMITH_TRACING', 'false')
          from agents.nutrition_agent.graph import graph
          print('nutrition graph import in image OK')
          " || echo "Note: import check skipped if runtime env not available in image"

  build-ui-image:
    name: Build UI Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build UI image
        run: docker build -f Dockerfile.ui -t personal-shopper-ui:ci .

      - name: Smoke test UI image
        run: |
          docker run --rm personal-shopper-ui:ci \
            python -c "import server; print('UI image OK')"

  helm-validate:
    name: Helm Validate (layered chart)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Lint supervisor + UI (local overlay)
        run: |
          for agent in supervisor ui; do
            helm lint deploy/helm/charts/langgraph-primitives \
              -f deploy/helm/org/values.yaml \
              -f deploy/helm/overlays/local/values.yaml \
              -f "deploy/helm/agents/${agent}/values.yaml" \
              -f deploy/helm/org/configmap.yaml \
              -f deploy/helm/overlays/local/configmap.yaml \
              -f "deploy/helm/agents/${agent}/configmap.yaml"
          done

      - name: Template supervisor — inter-agent URLs
        run: |
          helm template supervisor deploy/helm/charts/langgraph-primitives \
            --namespace agents-dev \
            -f deploy/helm/org/values.yaml \
            -f deploy/helm/overlays/local/values.yaml \
            -f deploy/helm/agents/supervisor/values.yaml \
            -f deploy/helm/org/configmap.yaml \
            -f deploy/helm/overlays/local/configmap.yaml \
            -f deploy/helm/agents/supervisor/configmap.yaml \
            > /tmp/supervisor.yaml
          grep -q "NUTRITION_AGENT_URL" /tmp/supervisor.yaml
          grep -q "http://nutrition-agent:8000" /tmp/supervisor.yaml
          echo "Layered Helm OK (full matrix: helm-validate workflow)"

  eval:
    name: LangSmith offline eval
    runs-on: ubuntu-latest
    needs: lint-and-test
    continue-on-error: true
    env:
      USE_MOCK_TOOLS: "true"
      LANGSMITH_TRACING: "true"
      LANGSMITH_PROJECT: personal-shopper-ci
      LANGSMITH_ENDPOINT: https://api.smith.langchain.com
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Seed datasets (idempotent — only adds missing examples)
        run: python tests/eval/seed_datasets.py

      - name: Eval — parse_request schema correctness
        run: |
          python tests/eval/run_parse_eval.py \
            --threshold 0.70 \
            --ci \
            --experiment-prefix "ci-pr-${{ github.run_number }}"

      - name: Eval — recipe relevance (informational)
        continue-on-error: true
        run: |
          python tests/eval/run_recipe_eval.py \
            --threshold 0.50 \
            --experiment-prefix "ci-pr-${{ github.run_number }}"

      - name: Eval — substitution quality (informational)
        continue-on-error: true
        run: |
          python tests/eval/run_substitution_eval.py \
            --threshold 0.50 \
            --experiment-prefix "ci-pr-${{ github.run_number }}"
