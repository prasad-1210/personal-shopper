agent:
  name: ui
  graphId: ""
  type: ui
  port: 8080            # K8s local stack (local-k8s-setup); dev process uses 22005

image:
  repository: personal-shopper-ui
  tag: local
  pullPolicy: Never

secretName: ui-secrets

replicaCount: 1

langsmith:
  project: personal-shopper-ui-local

redis:
  enabled: false

postgres:
  enabled: false

interAgent:
  supervisorUrl: ""     # set at deploy: http://supervisor.<namespace>.svc.cluster.local:8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: personal-shopper.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

uiHealthProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15
