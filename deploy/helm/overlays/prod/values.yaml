replicaCount: 2

image:
  pullPolicy: Always
  pullSecrets:
    - name: acr-pull-secret

podSecurityContext:
  runAsNonRoot: false   # required for langgraph wolfi images
  runAsUser: 0
  seccompProfile:
    type: RuntimeDefault  # keep for audit; verify wolfi compatibility on your node pool

redis:
  externalName: prod-redis.redis.cache.windows.net
  port: 6380

postgres:
  externalName: prod-postgres.postgres.database.azure.com

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10

pdb:
  enabled: true
  minAvailable: 1

agentNetworkPolicy:
  enabled: true
  allowFromNamespace: agents-prod

terminationGracePeriodSeconds: 120
