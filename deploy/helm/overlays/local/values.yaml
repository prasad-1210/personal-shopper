# Local Docker Desktop Kubernetes — agents-local namespace
# Used by deploy/scripts/local-k8s-setup.sh

image:
  pullPolicy: Never

podSecurityContext:
  runAsNonRoot: false

redis:
  enabled: true
  externalName: redis-master.agents-local.svc.cluster.local

postgres:
  enabled: true
  externalName: postgres-postgresql.agents-local.svc.cluster.local

agentNetworkPolicy:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

replicaCount: 1

pdb:
  enabled: false

startupProbe:
  failureThreshold: 60
  periodSeconds: 5

healthProbe:
  initialDelaySeconds: 45
  periodSeconds: 10
  failureThreshold: 6
