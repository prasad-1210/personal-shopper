{{- if .Values.agentNetworkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "langgraph-primitives.fullname" . }}-allow-supervisor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "langgraph-primitives.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "langgraph-primitives.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.agentNetworkPolicy.allowFromNamespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.agentNetworkPolicy.allowFromSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ include "langgraph-primitives.containerPort" . }}
{{- end }}
