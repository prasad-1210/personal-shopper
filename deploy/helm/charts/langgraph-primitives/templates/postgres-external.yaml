{{- if and .Values.postgres.enabled .Values.postgres.externalName (ne (include "langgraph-primitives.isUi" .) "true") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "langgraph-primitives.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "langgraph-primitives.labels" . | nindent 4 }}
  annotations:
    langgraph/postgres-database: {{ .Values.postgres.database | quote }}
spec:
  type: ExternalName
  externalName: {{ .Values.postgres.externalName }}
  ports:
    - port: {{ .Values.postgres.port | default 5432 }}
      protocol: TCP
      name: postgres
{{- end }}
